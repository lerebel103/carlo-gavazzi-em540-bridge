services:
  em540-bridge:
    image: lerebel103/em540-bridge:latest
    container_name: em540-bridge
    stdin_open: true
    privileged: false
    tty: true
    restart: unless-stopped
    volumes:
      - /home/willc/em540-bridge:/app/config
    environment:
      - TZ="Australia/Perth"
    ports:
      - 5002:5002
      - 5003:5003
      - 5004:5004


