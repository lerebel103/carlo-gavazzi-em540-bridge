name: Build & Push Docker

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  IMAGE_NAME: lerebel103/carlo-gavazzi-em540-bridge

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.publish_vars.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Determine build version
        id: build_version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Determine publish behavior
        id: publish_vars
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "version_tag=" >> "$GITHUB_OUTPUT"
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Tag '${GITHUB_REF_NAME}' must match vx.y.z (example: v1.2.3)."
              exit 1
            fi
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "version_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:latest"
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pull requests and non-publish events: build only, no push.
          echo "push=false" >> "$GITHUB_OUTPUT"
          echo "version_tag=" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:ci-${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v4.0.0

      - name: Login to DockerHub
        if: steps.publish_vars.outputs.push == 'true'
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.publish_vars.outputs.push == 'true' }}
          tags: ${{ steps.publish_vars.outputs.tags }}
          build-args: |
            VERSION=${{ steps.build_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate release tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' must match vx.y.z (example: v1.2.3)."
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          
          # Extract changelog section for this release from CHANGELOG.md
          if grep -q "## \[$TAG\]" CHANGELOG.md; then
            # Extract from the release section header to the next major section
            CHANGELOG_SECTION=$(sed -n "/^## \[$TAG\]/,/^## \[/p" CHANGELOG.md | sed '$ d')
            echo "section_found=true" >> "$GITHUB_OUTPUT"
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGELOG_SECTION" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            # Fallback to git log if CHANGELOG.md entry not found
            echo "section_found=false" >> "$GITHUB_OUTPUT"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              CHANGES=$(git log --oneline --no-decorate)
            else
              CHANGES=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
            fi
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            echo "## Git Commits" >> "$GITHUB_OUTPUT"
            echo "$CHANGES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(cat <<'BODY_EOF'
          ${{ steps.changelog.outputs.changelog }}

          ## Docker Images
          ```
          docker pull lerebel103/carlo-gavazzi-em540-bridge:${{ github.ref_name }}
          docker pull lerebel103/carlo-gavazzi-em540-bridge:latest
          ```

          ---

          For more details, see [CHANGELOG.md](https://github.com/lerebel103/carlo-gavazzi-em540-bridge/blob/${{ github.ref_name }}/CHANGELOG.md) or the repository's [releases page](https://github.com/lerebel103/carlo-gavazzi-em540-bridge/releases).
          BODY_EOF
          )

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "$BODY"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "$BODY" \
              --verify-tag
          fi
